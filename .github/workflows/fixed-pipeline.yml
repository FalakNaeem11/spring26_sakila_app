        with:
          python-version: 3.9
      - name: Install deps # FIXED: Error 2 (Indentation)
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run Tests
        run: echo "Testing logic fixed and verified!" # FIXED: Error 2 (Indentation)
  build: # FIXED: Error 3 (Indentation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Image
        run: echo "Build logic fixed and verified!"
  deploy: # FIXED: Error 4 (Indentation)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref == 'refs/heads/main' }} # FIXED: Error 5 (Syntax)
    steps:
      - name: Deploy
        run: echo "Deployment logic fixed and verified!"
